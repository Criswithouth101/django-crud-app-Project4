<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Books</title>
</head>
<body>
  <h1>Books</h1>
  <p><a href="{% url 'books:add' %}">Add a new book</a></p>

  {% if object_list %}
    <ul>
      {% for book in object_list %}
        <li>
          <a href="{% url 'books:detail' book.pk %}">{{ book.title }}</a>
          &mdash; {{ book.author }}
          <small>(<a href="{% url 'books:edit' book.pk %}">edit</a> |
                 <a href="{% url 'books:delete' book.pk %}">delete</a>)</small>
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <p>No books yet. <a href="{% url 'books:add' %}">Add one</a>.</p>
  {% endif %}
</body>
</html>
